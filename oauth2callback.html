<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing in - Inhouse Notes</title>
</head>
<body>
  <script>
    if (window.location.hash && window.location.hash.includes('access_token=')) {
      window.location.replace(`inhousenotes://oauth2callback${window.location.hash}`);
    } else if (window.location.search && window.location.search.includes('error=')) {
      window.location.replace(`inhousenotes://oauth2callback#${window.location.search.slice(1)}`);
    }
    const target = new URL('/', window.location.origin);
    target.searchParams.set('inhouse_app', '1');
    target.hash = window.location.hash || '';
    setTimeout(() => {
      window.location.replace(target.toString());
    }, 500);
  </script>
</body>
</html>
